version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile

    env_file:
      - ../.env

    ports:
      - "5000:5000"

    depends_on:
      - postgres

    restart: unless-stopped

  postgres:
    image: postgres:16

    env_file:
      - ../.env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

volumes:
  postgres_data: